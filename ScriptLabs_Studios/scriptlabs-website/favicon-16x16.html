<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScriptLabs Favicon 16x16</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .favicon-container {
            width: 16px;
            height: 16px;
            display: block;
        }
    </style>
</head>
<body>
    <div class="favicon-container">
        <svg width="16" height="16" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Background Circle -->
            <circle cx="16" cy="16" r="16" fill="url(#gradient1)"/>
            
            <!-- S Letter stylized as code brackets -->
            <path d="M11 8.5C11 8.5 8.5 10 8.5 12.5C8.5 15 10.5 16 10.5 16C10.5 16 8.5 17 8.5 19.5C8.5 22 11 23.5 11 23.5" 
                  stroke="white" 
                  stroke-width="2" 
                  stroke-linecap="round" 
                  stroke-linejoin="round"
                  fill="none"/>
            
            <!-- L Letter as forward slash (representing code) -->
            <path d="M18 8L14 24" 
                  stroke="white" 
                  stroke-width="2.5" 
                  stroke-linecap="round"/>
            
            <!-- Closing bracket -->
            <path d="M21 8.5C21 8.5 23.5 10 23.5 12.5C23.5 15 21.5 16 21.5 16C21.5 16 23.5 17 23.5 19.5C23.5 22 21 23.5 21 23.5" 
                  stroke="white" 
                  stroke-width="2" 
                  stroke-linecap="round" 
                  stroke-linejoin="round"
                  fill="none"/>
            
            <!-- Gradient Definition -->
            <defs>
                <linearGradient id="gradient1" x1="0" y1="0" x2="32" y2="32">
                    <stop offset="0%" stop-color="#0066FF"/>
                    <stop offset="50%" stop-color="#6B46C1"/>
                    <stop offset="100%" stop-color="#10B981"/>
                </linearGradient>
            </defs>
        </svg>
    </div>
</body>
</html>
